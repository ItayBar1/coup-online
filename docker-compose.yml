services:
  coup:
    image: ghcr.io/itaybar1/coup-online:${IMAGE_TAG:-latest}
    container_name: coup-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ""
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      PORT: "8000"
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
    restart: unless-stopped
    networks:
      - coup-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Cloudflare Tunnel: חיבור מאובטח לעולם ללא פתיחת פורטים
  coup-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: coup-tunnel
    command: tunnel --no-autoupdate run --token ${COUP_TUNNEL_TOKEN}
    restart: unless-stopped
    networks:
      - coup-net

  # Watchtower: עדכון אוטומטי של האימג'ים
  watchtower:
    image: containrrr/watchtower:latest
    container_name: coup-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    # מעקב אחרי קונטיינר האפליקציה בלבד
    command: --interval 300 coup-app
    restart: unless-stopped
    networks:
      - coup-net

networks:
  coup-net:
    driver: bridge
